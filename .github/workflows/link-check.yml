name: Link Check

on:
  push:
    branches: [master]
    paths:
      - "app/src/main/java/com/setupassistant/app/data/SetupContent.kt"
      - ".github/workflows/link-check.yml"
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch:

jobs:
  check-urls:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check official URLs are reachable
        run: |
          # URLs are read straight out of the content file so there is no
          # second list to keep in sync. Only officialUrl values are checked —
          # expectedOutput samples contain placeholder URLs that aren't real.
          source_file="app/src/main/java/com/setupassistant/app/data/SetupContent.kt"
          mapfile -t urls < <(
            grep -oE 'officialUrl = "https://[^"]+"' "$source_file" \
              | grep -oE 'https://[^"]+' | sort -u
          )

          if [[ ${#urls[@]} -eq 0 ]]; then
            echo "::error::No URLs found in $source_file — the extraction is probably broken"
            exit 1
          fi
          echo "Found ${#urls[@]} URLs to check"

          # 401/403 are treated as non-fatal: many sites (e.g. Cloudflare-protected
          # pages) block plain curl requests as a bot even though the page is fine
          # for real users. Only 404/410 (gone) and 5xx (server error) fail the check.
          fail=0
          for url in "${urls[@]}"; do
            code=$(curl -s -o /dev/null -w "%{http_code}" -L --max-time 15 \
              -A "Mozilla/5.0 (compatible; setup-assistant-link-check/1.0)" "$url")
            if [[ "$code" == "404" || "$code" == "410" || "$code" -ge 500 ]]; then
              echo "::error::$url returned HTTP $code"
              fail=1
            elif [[ "$code" -ge 400 ]]; then
              echo "::warning::$url returned HTTP $code (likely bot-blocked, not treated as dead)"
            else
              echo "OK ($code): $url"
            fi
          done
          exit $fail
