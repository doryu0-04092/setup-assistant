name: Android Build

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install required Android SDK packages
        run: yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" --sdk_root="$ANDROID_HOME"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Assemble debug APK
        run: gradle assembleDebug
