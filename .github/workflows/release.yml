name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install required Android SDK packages
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Restore keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          if [[ -z "$KEYSTORE_BASE64" ]]; then
            echo "::error::KEYSTORE_BASE64 secret is not set. See docs/release.md"
            exit 1
          fi
          echo "$KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Build signed release APK
        env:
          KEYSTORE_PATH: ${{ runner.temp }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle assembleRelease

      # 署名されていないAPKを配ってしまわないよう、公開前に確かめる
      - name: Verify the APK is signed
        run: |
          apksigner=$(find "$ANDROID_HOME/build-tools" -name apksigner | sort | tail -1)
          "$apksigner" verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Remove keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/release.keystore"

      - name: Publish to Releases
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/app-release.apk
          generate_release_notes: true
          body: |
            ## インストール手順

            1. 下の `app-release.apk` をAndroid端末でダウンロードする
            2. ファイルを開くと「提供元不明のアプリ」に関する確認が出るので、設定画面で許可する
            3. インストールして起動する

            動作要件: Android 8.0 以降
